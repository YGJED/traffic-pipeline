services:

  # -----------------------
  # ZOOKEEPER
  # -----------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "bash", "-c", "echo 'ruok' | nc localhost 2181"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  # -----------------------
  # KAFKA
  # -----------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_TOPIC: road-segments
      KAFKA_PARTITIONS: 8
    volumes:
      - ./scripts/kafka-init.sh:/kafka-init.sh
    command: bash /kafka-init.sh
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server=localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  # -----------------------
  # PRODUCER CONTAINER
  # -----------------------
  producer-app:
    build: ./producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC=road-segments
    volumes:
      - ./producer:/app
      - ./.env:/app/.env
    command: tail -f /dev/null

  # -----------------------
  # KAFKA CONSUMER FOR TESTING
  # -----------------------
  # kafka-consumer:
  #   build: ./producer
  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #   environment:
  #     - KAFKA_BOOTSTRAP=kafka:9092
  #     - KAFKA_TOPIC=road-segments
  #   volumes:
  #     - ./producer:/app
  #     - ./.env:/app/.env
  #   command: python consumer.py --bootstrap kafka:9092 --topic road-segments

  # -----------------------
  # SPARK MASTER
  # (Official apache/spark image does not use SPARK_MODE; run Master explicitly.)
  # -----------------------
  spark-master:
    image: apache/spark:3.5.0
    hostname: spark-master
    ports:
      - "7077:7077"
      - "8081:8080"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080

  # -----------------------
  # SPARK WORKER
  # -----------------------
  spark-worker:
    image: apache/spark:3.5.0
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      --cores 2
      --memory 2g
      spark://spark-master:7077

  # -----------------------
  # SPARK STREAMING JOB
  # -----------------------
  spark-app:
    build: ./spark
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_started
    environment:
      - HADOOP_USER_NAME=spark
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=road-segments
      # Streaming micro-batch progress in driver logs (streaming_job.py)
      - SPARK_LOG_LEVEL=INFO
    volumes:
      - ./spark:/app
      - ./.env:/app/.env
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --conf spark.jars.ivy=/tmp/.ivy2
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.hadoop:hadoop-aws:3.3.4
      /app/streaming_job.py


  # -----------------------
  # SPARK BATCH JOB (TEMP)
  #------------------------
  spark-batch:
    build: ./spark
    depends_on:
      spark-master:
        condition: service_started
      spark-worker:
        condition: service_started
    environment:
      - HADOOP_USER_NAME=spark
      - SPARK_LOG_LEVEL=INFO
    volumes:
      - ./spark:/app
      - ./.env:/app/.env
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --executor-memory 1g
      --driver-memory 512m
      --total-executor-cores 2
      --conf spark.jars.ivy=/tmp/.ivy2
      --packages org.apache.hadoop:hadoop-aws:3.3.4
      /app/spark_batch.py


  # -----------------------
  # STREAMLIT DASHBOARD
  # -----------------------
  streamlit:
    build: ./streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit:/app
    command: streamlit run main.py --server.address=0.0.0.0

  # -----------------------
  # FASTAPI API
  # -----------------------
  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./.env:/app/.env
