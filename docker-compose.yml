services:

  # -----------------------
  # ZOOKEEPER
  # -----------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # -----------------------
  # KAFKA
  # -----------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server=localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  # -----------------------
  # PRODUCER CONTAINER
  # -----------------------
  producer-app:
    build: ./producer
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC=road-segments
    volumes:
      - ./producer:/app
      - ./.env:/app/.env
    command: tail -f /dev/null

  # -----------------------
  # KAFKA CONSUMER FOR TESTING
  # -----------------------
  # kafka-consumer:
  #   build: ./producer
  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #   environment:
  #     - KAFKA_BOOTSTRAP=kafka:9092
  #     - KAFKA_TOPIC=road-segments
  #   volumes:
  #     - ./producer:/app
  #     - ./.env:/app/.env
  #   command: python consumer.py --bootstrap kafka:9092 --topic road-segments

  # -----------------------
  # SPARK MASTER
  # (Official apache/spark image does not use SPARK_MODE; run Master explicitly.)
  # -----------------------
  spark-master:
    image: apache/spark:3.5.0
    hostname: spark-master
    ports:
      - "7077:7077"
      - "8081:8080"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080

  # -----------------------
  # SPARK WORKER
  # -----------------------
  spark-worker:
    image: apache/spark:3.5.0
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

  # -----------------------
  # SPARK STREAMING JOB
  # -----------------------
  spark-app:
    build: ./spark
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_started
    environment:
      - HADOOP_USER_NAME=spark
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=road-segments
      # Streaming micro-batch progress in driver logs (streaming_job.py)
      - SPARK_LOG_LEVEL=INFO
    volumes:
      - ./spark:/app
      - ./.env:/app/.env
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --conf spark.jars.ivy=/tmp/.ivy2
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.hadoop:hadoop-aws:3.3.4
      /app/streaming_job.py

  # -----------------------
  # STREAMLIT DASHBOARD
  # -----------------------
  streamlit:
    build: ./streamlit
    ports:
      - "8501:8501"
    depends_on:
      - kafka
    volumes:
      - ./streamlit:/app
    command: streamlit run app.py --server.address=0.0.0.0
