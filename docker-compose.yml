x-airflow-common: &airflow-common
  build: ./airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    # Same value on webserver + scheduler so the UI can fetch worker/task logs (avoids 403 FORBIDDEN on log URLs).
    AIRFLOW__WEBSERVER__SECRET_KEY: traffic-pipeline-local-dev-airflow-secret-key
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/scripts:/opt/airflow/scripts
    - .:/opt/airflow/repo
    - ./.env:/opt/airflow/.env
    - ./data:/opt/airflow/data
    - ./inrix_historical_parquet:/opt/airflow/inrix_historical_parquet
    - ./inrix_stream_parquet:/opt/airflow/inrix_stream_parquet
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    postgres:
      condition: service_healthy

services:

  # -----------------------
  # ZOOKEEPER
  # -----------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # -----------------------
  # KAFKA
  # -----------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server=localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  # -----------------------
  # PRODUCER CONTAINER
  # -----------------------
  producer-app:
    build: ./producer
    depends_on:
      - kafka
    env_file:
      # Inject creds as env vars (no bind mount). Mounting ./.env into /app/.env breaks when
      # compose runs from Airflow: the daemon may treat the source path as a dir or wrong type.
      - .env
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC=road-segments
    # No volumes: see env_file above and streaming_dag --build for producer source.
    command: tail -f /dev/null

  # -----------------------
  # KAFKA CONSUMER FOR TESTING
  # -----------------------
  kafka-consumer:
    build: ./producer
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC=road-segments
    volumes:
      # Local/dev helper service: keep bind mount for quick consumer.py edits from host.
      # (Unlike producer-app, this service is not used by Airflow DAG orchestration.)
      - ./producer:/app
    command: python consumer.py --bootstrap kafka:9092 --topic road-segments

  # -----------------------
  # POSTGRES (Airflow metadata DB)
  # -----------------------
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # -----------------------
  # AIRFLOW INIT
  # -----------------------
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    restart: "no"

  # -----------------------
  # AIRFLOW WEBSERVER
  # -----------------------
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init
    restart: always

  # -----------------------
  # AIRFLOW SCHEDULER
  # -----------------------
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init
    restart: always

  # -----------------------
  # SPARK MASTER
  # (Official apache/spark image does not use SPARK_MODE; run Master explicitly.)
  # -----------------------
  spark-master:
    image: apache/spark:3.5.0
    hostname: spark-master
    ports:
      - "7077:7077"
      - "8081:8080"
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080

  # -----------------------
  # SPARK WORKER
  # -----------------------
  spark-worker:
    image: apache/spark:3.5.0
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077

  # -----------------------
  # SPARK STREAMING JOB
  # -----------------------
  spark-app:
    build: ./spark
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_started
    env_file:
      - .env
    environment:
      - HADOOP_USER_NAME=spark
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=road-segments
      # Streaming micro-batch progress in driver logs (streaming_job.py)
      - SPARK_LOG_LEVEL=INFO
    command: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --conf spark.jars.ivy=/tmp/.ivy2
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.hadoop:hadoop-aws:3.3.4
      /app/streaming_job.py

  # -----------------------
  # STREAMLIT DASHBOARD
  # -----------------------
  streamlit:
    build: ./streamlit
    ports:
      - "8501:8501"
    depends_on:
      - kafka
    volumes:
      - ./streamlit:/app
    command: streamlit run app.py --server.address=0.0.0.0
